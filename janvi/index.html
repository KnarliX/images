<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomly Redirect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f8ff;
            color: #333;
        }
        h1 {
            color: #007BFF;
        }
        .link-container {
            margin: 20px 0;
        }
        .link {
            display: inline-block;
            margin: 10px 0;
            text-decoration: none;
            color: #007BFF;
            padding: 10px 20px;
            border: 2px solid #007BFF;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        .link:hover {
            background-color: #007BFF;
            color: white;
        }
        .description {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Welcome to the <b>Janvi Dreamer</b> social links</h1>
    <p>You are being redirected to a random page...</p>
    <p>If you are not redirected automatically, please choose one of the links below:</p>
    <div id="links" class="link-container"></div>

    <script>
        const urls = [
            {
                url: "https://knarlix.github.io/Dreamer",
                name: "Dreamer",
                description: "view my Dreamer social links."
            },
            {
                url: "https://www.youtube.com/channel/UCa4-5c2gCYxqummRhmh6V4Q",
                name: "YouTube Channel",
                description: "Check out our YouTube channel."
            },
            {
                url: "https://www.instagram.com/janvi_dreamer",
                name: "Instagram",
                description: "Follow us on Instagram."
            },
            {
                url: "https://discord.gg/JanviDreamer",
                name: "Discord Server",
                description: "Join our Discord community."
            }
        ];

        // Randomly select a URL
        const randomIndex = Math.floor(Math.random() * urls.length);
        const selectedUrl = urls[randomIndex].url;

        // Redirect immediately
        window.location.href = selectedUrl;

        // Display links with descriptions
        const linksDiv = document.getElementById('links');
        urls.forEach(item => {
            const link = document.createElement('a');
            link.href = item.url;
            link.target = "_blank"; // Open in new tab
            link.className = 'link';
            link.innerText = item.name;

            const description = document.createElement('div');
            description.className = 'description';
            description.innerText = item.description;

            linksDiv.appendChild(link);
            linksDiv.appendChild(description);
        });
    </script>
</body>
</html>
