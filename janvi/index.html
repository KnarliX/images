<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Redirect Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f0f8ff;
            color: #333;
        }
        h1 {
            color: #007BFF;
        }
        a {
            display: inline-block;
            margin: 10px 0;
            text-decoration: none;
            color: #007BFF;
            padding: 10px 20px;
            border: 2px solid #007BFF;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #007BFF;
            color: white;
        }
        #countdown {
            font-size: 24px;
            margin: 20px 0;
            color: #FF4500;
        }
        #message {
            font-size: 18px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Random Redirect Page</h1>
    <p id="message">You will be redirected to a random page in <span id="countdown">3</span> seconds.</p>
    <p>If you are not redirected automatically, please choose one of the links below:</p>
    <div id="links"></div>

    <script>
        const urls = [
            "https://knarlix.github.io/Dreamer",
            "https://www.youtube.com/channel/UCa4-5c2gCYxqummRhmh6V4Q",
            "https://www.instagram.com/janvi_dreamer",
            "https://discord.gg/JanviDreamer"
        ];

        // Randomly select a URL
        const randomIndex = Math.floor(Math.random() * urls.length);
        const selectedUrl = urls[randomIndex];

        // Countdown timer
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        const countdownInterval = setInterval(() => {
            countdown--;
            countdownElement.innerText = countdown;
            if (countdown <= 0) {
                clearInterval(countdownInterval);
                window.location.href = selectedUrl;
            }
        }, 1000);

        // Display links
        const linksDiv = document.getElementById('links');
        urls.forEach(url => {
            const link = document.createElement('a');
            link.href = url;
            link.target = "_blank"; // Open in new tab
            link.innerText = url;
            linksDiv.appendChild(link);
        });
    </script>
</body>
</html>
